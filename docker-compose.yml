services:

  # ── Backend (Express + MongoDB) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=einlich
      - JWT_SECRET=${JWT_SECRET}
      - REPORTS_PASSWORD=${REPORTS_PASSWORD}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - PORT=3001
    # Expose internally so nginx can reach it; no public exposure needed.
    expose:
      - "3001"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Frontend (React SPA served by nginx, proxies /api to backend) ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
