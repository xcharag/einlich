services:

  # ── Backend (Express + MongoDB) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=einlich
      - JWT_SECRET=${JWT_SECRET}
      - REPORTS_PASSWORD=${REPORTS_PASSWORD}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - PORT=3001
    # Expose internally so nginx can reach it; no public exposure needed.
    expose:
      - "3001"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Frontend (React SPA served by nginx, proxies /api to backend) ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app-net
      - coolify

networks:
  app-net:
    driver: bridge
  coolify:
    external: true
